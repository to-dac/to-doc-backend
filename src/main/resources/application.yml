spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        default_batch_fetch_size: 100
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.todoc: INFO

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}

external:
  kakao:
    api-key: ${KAKAO_API_KEY}
    address-search-url: https://dapi.kakao.com/v2/local/search/address.json
  vworld:
    api-key: ${VWORLD_API_KEY}
    land-url: https://api.vworld.kr/ned/data/getLandCharacteristics
    land-use-url: https://api.vworld.kr/ned/data/getLandUseAttr
    wfs-url: https://api.vworld.kr/req/wfs
  data-go-kr:
    api-key: ${DATA_GO_KR_API_KEY}
    building-url: http://apis.data.go.kr/1613000/BldRgstHubService/getBrTitleInfo
